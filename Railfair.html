<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rail Fence Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-4">
        <table class="table border">
            <thead class="thead-light">
                <tr><th style="text-align: center; font-weight: bold; font-size: 25px;">RAIL FENCE CIPHER</th></tr>
            </thead>
            <tbody>
                <tr><td style="font-weight: bold; color: #007bff">ENCRYPTION</td></tr>
                <tr>
                    <td>
                        <form method="POST" action="/encrypt_railfence">
                            <div class="form-group">
                                <label>Plain text:</label>
                                <input type="text" class="form-control" name="inputPlainText" placeholder="Nhập văn bản cần mã hóa" required>
                            </div>
                            <div class="form-group">
                                <label>Number of Rails (Key):</label>
                                <input type="number" class="form-control" name="inputKey" min="2" placeholder="Nhập số hàng (ví dụ: 2, 3...)" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Encrypt</button>
                        </form>
                    </td>
                </tr>
                <tr><td style="font-weight: bold; color: #28a745">DECRYPTION</td></tr>
                <tr>
                    <td>
                        <form method="POST" action="/decrypt_railfence">
                            <div class="form-group">
                                <label>Cipher text:</label>
                                <input type="text" class="form-control" name="inputCipherText" placeholder="Nhập văn bản cần giải mã" required>
                            </div>
                            <div class="form-group">
                                <label>Number of Rails (Key):</label>
                                <input type="number" class="form-control" name="inputKey" min="2" placeholder="Nhập số hàng" required>
                            </div>
                            <button type="submit" class="btn btn-success">Decrypt</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="mt-3 text-center">
            <a href="/" class="btn btn-outline-secondary">Trở về trang chủ</a>
        </div>
    </div>
</body>
</html>
