<!DOCTYPE html>
<html lang="en">
<head>
    <title>Vigenere Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-4">
        <table class="table border shadow-sm">
            <thead class="bg-info text-white">
                <tr><th style="text-align: center; font-size: 25px;">VIGENERE CIPHER</th></tr>
            </thead>
            <tbody>
                <tr><td style="font-weight: bold; color: blue">ENCRYPTION</td></tr>
                <tr>
                    <td>
                        <form method="POST" action="/encrypt_vigenere">
                            <div class="form-group">
                                <label>Plain text:</label>
                                <input type="text" class="form-control" name="inputPlainText" placeholder="Nhập văn bản cần mã hóa" required>
                            </div>
                            <div class="form-group">
                                <label>Key (String):</label>
                                <input type="text" class="form-control" name="inputKey" placeholder="Nhập từ khóa (ví dụ: PYTHON)" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Encrypt</button>
                        </form>
                    </td>
                </tr>
                <tr><td style="font-weight: bold; color: green">DECRYPTION</td></tr>
                <tr>
                    <td>
                        <form method="POST" action="/decrypt_vigenere">
                            <div class="form-group">
                                <label>Cipher text:</label>
                                <input type="text" class="form-control" name="inputCipherText" placeholder="Nhập bản mã cần giải mã" required>
                            </div>
                            <div class="form-group">
                                <label>Key (String):</label>
                                <input type="text" class="form-control" name="inputKey" placeholder="Nhập từ khóa giải mã" required>
                            </div>
                            <button type="submit" class="btn btn-success">Decrypt</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="mt-3 text-center">
            <a href="/" class="btn btn-outline-secondary">Quay lại trang chủ</a>
        </div>
    </div>
</body>
</html>
